<section class="history">
  <header class="history__header">
    <h2>Historical Performance</h2>
    <div class="history__controls">
      <label>
        Fuel type
        <select [ngModel]="fuelType" (ngModelChange)="onFuelTypeChange($event)">
          <option *ngFor="let f of fuelTypes" [value]="f">{{ f }}</option>
        </select>
      </label>
      <button type="button" class="btn btn--ghost" (click)="reload()">Refresh</button>
    </div>
  </header>

  <app-loading-spinner *ngIf="loading"></app-loading-spinner>

  <app-empty-state
    *ngIf="!loading && error"
    tone="error"
    title="Backend error"
    [message]="error">
  </app-empty-state>

  <ng-container *ngIf="!loading && !error">
    <div *ngIf="recordCount > 0" class="history__summary">
      <app-stat-card label="Records" [value]="recordCount"></app-stat-card>
      <app-stat-card label="Min stock" [value]="(minStock | number:'1.0-0') + ' L'"></app-stat-card>
      <app-stat-card label="Avg stock" [value]="(avgStock | number:'1.0-0') + ' L'"></app-stat-card>
      <app-stat-card label="Max stock" [value]="(maxStock | number:'1.0-0') + ' L'"></app-stat-card>
    </div>

    <div *ngIf="rows.length > 0" class="history__charts">
      <!-- Stock Level Chart -->
      <div class="history__chart-card">
        <h3>Stock Level Over Time</h3>
        <div class="history__chart-container">
          <canvas baseChart
            [data]="stockChartData"
            [options]="stockChartOptions"
            type="line">
          </canvas>
        </div>
      </div>

      <!-- Price Trend Chart -->
      <div class="history__chart-card">
        <h3>Price Trend</h3>
        <div class="history__chart-container">
          <canvas baseChart
            [data]="priceChartData"
            [options]="priceChartOptions"
            type="line">
          </canvas>
        </div>
      </div>

      <!-- Sales Activity Chart -->
      <div class="history__chart-card">
        <h3>Sales Activity (5-min intervals)</h3>
        <div class="history__chart-container">
          <canvas baseChart
            [data]="salesChartData"
            [options]="salesChartOptions"
            type="bar">
          </canvas>
        </div>
      </div>

      <!-- Capacity vs Stock Chart -->
      <div class="history__chart-card">
        <h3>Capacity vs Stock Comparison</h3>
        <div class="history__chart-container">
          <canvas baseChart
            [data]="capacityChartData"
            [options]="capacityChartOptions"
            type="line">
          </canvas>
        </div>
      </div>
    </div>

    <app-empty-state
      *ngIf="rows.length === 0"
      tone="info"
      title="No history"
      message="No historical records found for this fuel type.">
    </app-empty-state>
  </ng-container>
</section>
