<section class="forecast">
  <header class="forecast__header">
    <h2>AI Forecast (Prophet)</h2>
  </header>

  <form class="forecast__controls" (submit)="$event.preventDefault(); generate()">
    <label>
      Station
      <select [(ngModel)]="stationId" name="station">
        <option *ngFor="let station of stations" [value]="station.station_id">
          {{ station.station_id }} — {{ station.location }}
        </option>
      </select>
    </label>

    <label>
      Fuel type
      <select [(ngModel)]="fuelType" name="fuelType">
        <option *ngFor="let f of fuelTypes" [value]="f">{{ f }}</option>
      </select>
    </label>

    <label>
      Horizon
      <select [(ngModel)]="periods" name="horizon">
        <option *ngFor="let h of horizons" [ngValue]="h.value">{{ h.label }}</option>
      </select>
    </label>

    <button type="submit" class="btn btn--primary" [disabled]="loading">
      {{ loading ? 'Generating…' : 'Generate forecast' }}
    </button>
  </form>

  <app-loading-spinner *ngIf="loading" message="Training Prophet model…"></app-loading-spinner>

  <app-empty-state
    *ngIf="!loading && error"
    tone="error"
    title="Forecast failed"
    [message]="error">
  </app-empty-state>

  <app-empty-state
    *ngIf="!loading && !error && rows.length === 0"
    tone="info"
    title="No forecast yet"
    message="Pick a station and click Generate forecast.">
  </app-empty-state>

  <div *ngIf="!loading && rows.length > 0" class="forecast__results">
    
    <!-- Chart -->
    <div class="forecast__chart">
      <canvas baseChart
        [data]="chartData"
        [options]="chartOptions"
        type="line">
      </canvas>
    </div>

    <!-- Narrative -->
    <div *ngIf="narrative" class="forecast__narrative">
      <h3>🤖 AI Analysis</h3>
      <p>{{ narrative }}</p>
    </div>

  </div>
</section>
